<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NEXUS Core Network Topology Visualization">
    <title>Network Topology Map | NEXUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map-container">
        <canvas id="network-canvas" width="1600" height="900"></canvas>
    </div>
    
    <div id="ui-panel" class="glass-panel">
        <div class="panel-header">
            <h2>NEXUS CORE</h2>
            <div class="status-indicator">
                <span class="dot pulse"></span>
                <span>System Online</span>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-value" id="node-count">0</span>
                <span class="stat-label">Active Nodes</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="edge-count">0</span>
                <span class="stat-label">Connections</span>
            </div>
        </div>
        
        <div class="controls">
            <button id="btn-zoom-in" class="btn" aria-label="Zoom In">Zoom In</button>
            <button id="btn-zoom-out" class="btn" aria-label="Zoom Out">Zoom Out</button>
            <button id="btn-reset" class="btn" aria-label="Reset View">Reset View</button>
        </div>

        <div id="node-details" class="details-box hidden">
            <h3>Node Detail</h3>
            <p id="detail-name">-</p>
            <p id="detail-type" class="badge">-</p>
            <p id="detail-status" class="status-ok">Operational</p>
        </div>
    </div>

    <!-- Mock CommonJS module system for dareal-ccNetViz -->
    <script>
        var module = { exports: {} };
    </script>
    <script src="ccNetViz.js"></script>
    <script>
        window.ccNetViz = module.exports;
    </script>
    <script src="app.js"></script>
</body>
</html>
